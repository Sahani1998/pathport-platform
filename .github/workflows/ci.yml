name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type-check + Lint + Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    # Advisory until NEXT_PUBLIC_SUPABASE_URL + NEXT_PUBLIC_SUPABASE_ANON_KEY
    # are configured as repository secrets. Failures show in the UI but do not
    # block merge. Remove continue-on-error once secrets are wired up.
    continue-on-error: true
    env:
      BASE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000 > /dev/null && echo "Server ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BROWSERS_PATH: /opt/pw-browsers
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
